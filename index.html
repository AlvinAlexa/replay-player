<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Replay Player</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0c10;
      --surf:#111318;
      --bdr:#1e2230;
      --acc:#e8b020;
      --red:#f04040;
      --txt:#e4e8f0;
      --muted:#5a6070;
      --tabbg:#181c26;
    }
    html,body{
      background:var(--bg);
      color:var(--txt);
      font-family:system-ui,'Segoe UI',sans-serif;
      height:100%;
      overflow:hidden; /* no scrollbars when embedded */
    }

    /* ── LAYOUT ── */
    .wrap{
      display:flex;
      flex-direction:column;
      height:100vh;
      min-height:280px;
    }

    /* ── TABS ── */
    .tabs{
      display:flex;
      gap:3px;
      padding:6px 10px 0;
      background:var(--surf);
      border-bottom:2px solid var(--acc);
      overflow-x:auto;
      scrollbar-width:none;
      flex-shrink:0;
    }
    .tabs:empty{display:none}
    .tabs::-webkit-scrollbar{display:none}
    .tab{
      font-size:12px;font-weight:700;
      letter-spacing:.6px;text-transform:uppercase;
      color:var(--muted);background:var(--tabbg);
      border:1px solid var(--bdr);border-bottom:none;
      border-radius:5px 5px 0 0;
      padding:6px 14px 7px;cursor:pointer;white-space:nowrap;
      transition:color .15s,background .15s,border-color .15s;
    }
    .tab:hover{color:var(--txt);background:#1e2438}
    .tab.on{color:#0a0c10;background:var(--acc);border-color:var(--acc)}
    .tab .n{
      display:inline-flex;align-items:center;justify-content:center;
      width:16px;height:16px;
      background:rgba(0,0,0,.22);border-radius:3px;
      font-size:9px;margin-right:5px;vertical-align:middle;
    }

    /* ── VIDEO ── */
    .stage{
      position:relative;background:#000;
      flex:1;min-height:0;
      overflow:hidden;
    }
    .vframe{
      display:block;width:100%;height:100%;border:none;
    }

    /* ── EMPTY ── */
    .empty{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      height:100%;gap:10px;color:var(--muted);text-align:center;padding:20px;
    }
    .empty svg{width:44px;height:44px;opacity:.2}
    .empty h2{font-size:16px;font-weight:700;color:var(--txt);opacity:.4}
    .empty p{font-size:12px;opacity:.45;max-width:320px;line-height:1.6}

    /* ── LOADER ── */
    .ld{
      position:absolute;inset:0;
      background:rgba(10,12,16,.8);
      display:flex;align-items:center;justify-content:center;
      z-index:9;opacity:0;pointer-events:none;
      transition:opacity .2s;
    }
    .ld.on{opacity:1;pointer-events:all}
    .spin{
      width:36px;height:36px;
      border:3px solid var(--bdr);border-top-color:var(--acc);
      border-radius:50%;animation:spin .65s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── FOOTER ── */
    .foot{
      display:flex;align-items:center;justify-content:space-between;
      padding:6px 10px;
      background:var(--surf);border-top:1px solid var(--bdr);
      flex-wrap:wrap;gap:6px;flex-shrink:0;
    }
    .foot:empty,.foot.hide{display:none}
    .inf{font-size:12px;font-weight:600;color:var(--txt)}
    .inf em{color:var(--acc);font-style:normal}
    .dots{display:flex;gap:5px;align-items:center}
    .dot{
      width:7px;height:7px;border-radius:50%;
      background:var(--bdr);cursor:pointer;
      transition:background .15s,transform .15s;
    }
    .dot.on{background:var(--acc);transform:scale(1.45)}
    .dot:hover:not(.on){background:var(--muted)}
    .navs{display:flex;gap:5px}
    .nb{
      background:var(--tabbg);border:1px solid var(--bdr);border-radius:4px;
      color:var(--muted);
      font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;
      padding:4px 12px;cursor:pointer;transition:all .15s;
    }
    .nb:hover:not(:disabled){color:var(--txt);border-color:var(--acc)}
    .nb:disabled{opacity:.25;cursor:not-allowed}
  </style>
</head>
<body>
<div class="wrap">
  <div class="tabs" id="tabs"></div>
  <div class="stage" id="stage">
    <div class="ld" id="ld"><div class="spin"></div></div>
    <div class="empty" id="empty">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4z"/></svg>
      <h2>No Video</h2>
      <p>Use the <strong style="color:var(--acc)">Builder</strong> to generate a link, then embed it here.</p>
    </div>
  </div>
  <div class="foot hide" id="foot">
    <div class="inf" id="inf">Part <em>1</em></div>
    <div class="dots" id="dots"></div>
    <div class="navs">
      <button class="nb" id="bp" onclick="go(-1)" disabled>&#9664;</button>
      <button class="nb" id="bn" onclick="go(1)">&#9654;</button>
    </div>
  </div>
</div>

<script>
// ── Parse ?embed= params (handles encoded URLs) ───────────────────────────
function getEmbeds(){
  const q = window.location.search.slice(1);
  if(!q) return [];
  const out=[];
  const parts = q.split(/&(?=embed=)/i);
  for(const p of parts){
    if(/^embed=/i.test(p)){
      try{ out.push(decodeURIComponent(p.slice(6))); }
      catch(e){ out.push(p.slice(6)); }
    }
  }
  return out.filter(Boolean);
}

const vids = getEmbeds();
let cur = 0;

const tabs  = document.getElementById('tabs');
const stage = document.getElementById('stage');
const empty = document.getElementById('empty');
const foot  = document.getElementById('foot');
const dots  = document.getElementById('dots');
const inf   = document.getElementById('inf');
const ld    = document.getElementById('ld');
const bp    = document.getElementById('bp');
const bn    = document.getElementById('bn');

if(vids.length){
  empty.style.display='none';
  foot.classList.remove('hide');
  vids.forEach((url,i)=>{
    // Tab
    const t=document.createElement('button');
    t.className='tab'+(i===0?' on':'');
    t.innerHTML='<span class="n">'+(i+1)+'</span>Part '+(i+1);
    t.onclick=()=>play(i);
    tabs.appendChild(t);
    // Dot
    const d=document.createElement('div');
    d.className='dot'+(i===0?' on':'');
    d.onclick=()=>play(i);
    dots.appendChild(d);
  });
  play(0);
}

function play(i){
  if(i<0||i>=vids.length)return;
  cur=i;
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('on',j===i));
  document.querySelectorAll('.dot').forEach((d,j)=>d.classList.toggle('on',j===i));
  inf.innerHTML='Part <em>'+(i+1)+'</em> of '+vids.length;
  bp.disabled=(i===0);
  bn.disabled=(i===vids.length-1);

  ld.classList.add('on');
  const old=stage.querySelector('iframe');
  if(old) old.remove();

  const f=document.createElement('iframe');
  f.className='vframe';
  f.name='search_iframe';
  f.id='freesport-eu-org';
  f.loading='lazy';
  // Sandbox: allow-popups needed for Dailymotion to work properly inside nested iframe
  f.setAttribute('sandbox','allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation allow-popups allow-presentation allow-popups-to-escape-sandbox');
  f.setAttribute('allow','autoplay; fullscreen; encrypted-media; picture-in-picture; web-share');
  f.setAttribute('allowfullscreen','allowfullscreen');
  f.setAttribute('frameborder','0');
  f.setAttribute('scrolling','no');
  f.style.cssText='width:100%;height:100%;position:absolute;top:0;left:0';
  f.src=vids[i];
  f.onload=()=>setTimeout(()=>ld.classList.remove('on'),400);
  stage.appendChild(f);
}

function go(d){play(cur+d)}
</script>
</body>
</html>
